<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Réservation</title>
</head>
<body>
    <h1>Créer une Réservation</h1>
    <form method="POST">
        {% csrf_token %}
        <label for="utilisateur_id">ID Utilisateur :</label>
        <input type="text" id="utilisateur_id" name="utilisateur_id" required>
        <br>
        <label for="offre_id">ID Offre :</label>
        <input type="text" id="offre_id" name="offre_id" required>
        <br>
        <button type="submit">Réserver</button>
    </form>
</body>
</html>
