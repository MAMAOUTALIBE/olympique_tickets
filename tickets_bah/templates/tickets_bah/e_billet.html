<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-billet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Votre E-billet</h1>
        <div class="card mx-auto" style="max-width: 400px;">
            <div class="card-body text-center">
                <h3 class="card-title">{{ reservation.offre.nom }}</h3>
                <p class="card-text">
                    <strong>Nom :</strong> {{ reservation.utilisateur.nom }} <br>
                    <strong>Email :</strong> {{ reservation.utilisateur.email }} <br>
                    <strong>Clé du billet :</strong> {{ reservation.cle_billet }}
                </p>
                {% if reservation.qr_code %}
                    <img src="{{ reservation.qr_code.url }}" alt="QR Code" class="img-fluid mb-3">
                {% else %}
                    <p>Aucun QR code disponible.</p>
                {% endif %}
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
